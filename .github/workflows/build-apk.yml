name: Build & Release APK

on:
  push:
    branches:
      - main
      - 'claude/**'
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Install ImageMagick
        run: sudo apt-get install -y imagemagick

      - name: Generate placeholder launcher icons (all densities)
        run: |
          declare -A sizes=(
            [mipmap-mdpi]=48
            [mipmap-hdpi]=72
            [mipmap-xhdpi]=96
            [mipmap-xxhdpi]=144
            [mipmap-xxxhdpi]=192
          )
          RES_DIR=app/src/main/res
          for density in "${!sizes[@]}"; do
            size=${sizes[$density]}
            dir="$RES_DIR/$density"
            mkdir -p "$dir"
            if [ ! -f "$dir/ic_launcher.png" ]; then
              convert -size "${size}x${size}" xc:'#006B5B' "$dir/ic_launcher.png"
            fi
            if [ ! -f "$dir/ic_launcher_round.png" ]; then
              convert -size "${size}x${size}" xc:'#006B5B' \
                -draw "circle $((size/2)),$((size/2)) $((size/2)),0" \
                "$dir/ic_launcher_round.png"
            fi
          done
          echo "Icon check complete."

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Build release APK
        run: ./gradlew assembleRelease --stacktrace

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: maraba-debug-${{ github.run_number }}
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: maraba-release-${{ github.run_number }}
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/claude/') || startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Maraba Build #${{ github.run_number }}"
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/v') }}
          generate_release_notes: ${{ startsWith(github.ref, 'refs/tags/v') }}
          files: |
            app/build/outputs/apk/debug/*.apk
            app/build/outputs/apk/release/*.apk
